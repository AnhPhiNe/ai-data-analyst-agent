services:
  - type: web
    name: ai-data-analyst-agent-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: ""
      - key: MAX_UPLOAD_MB
        value: "10"
      - key: MAX_ROWS
        value: "100000"
      - key: MAX_COLUMNS
        value: "200"
      - key: MAX_SESSIONS
        value: "25"
      - key: SESSION_TTL_SECONDS
        value: "3600"
      - key: REQUIRE_SESSION_TOKEN
        value: "false"
      - key: RATE_LIMIT_PER_MINUTE
        value: "120"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "60"
